<div class="container text-center">
  <img src="assets/img/task.png" alt="Task" />
    <div class="container">
    <div>
      <h3>
        {{queuedTasks | i18nPlural:queuedHeaderMapping}}
        for today
        <span class="small" *ngIf="queuedTasks > 0">
          (Estimated time: {{ queuedTasks * timerMinutes}} minutes)
        </span>
      </h3>
    </div>

  <div class="container">
    <h4>Tasks backlog</h4>
    <table class="table">
      <thead>
        <tr>
          <th>Task ID</th>
          <th>Task name</th>
          <th>Deliver by</th>
          <th>Count</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of tasks; let i = index">
          <th scope="row">{{i+1}}
            <span *ngIf="task.queued" class="label label-info">
              Queued
            </span>
          </th>
          <td>{{ task.name | slice:0:35 }}
            <span [hidden]="task.name.length < 35">...</span>
          </td>
          <td>
            {{ task.deadline | date:'fullDate' }}
            <span *ngIf="task.deadline < today" class="label label-danger">
              Due
            </span>
          </td>
          <td class="text-center">
            {{ task.noRequired }}
          </td>
          <td>
            <button type="button" class="btn btn-default btn-xs"
            [ngSwitch]="task.queued" (click)="toggleTask(task)">
              <ng-template [ngSwitchCase]="false">
                <i class="glyphicon glyphicon-plus-sign"></i>
                Add
              </ng-template>
              <ng-template [ngSwitchCase]="true">
                <i class="glyphicon glyphicon-minus-sign"></i>
                Remove
              </ng-template>
              <ng-template ngSwitchDefault>
                <i class="glyphicon glyphicon-plus-sign"></i>
                Add
              </ng-template>
            </button>
          </td>
        </tr>
      </tbody>
    </table>  </div> </div>
